<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Helpdesk{% endblock %} · Helpdesk</title>
    <style>
        :root {
            --bg: #16181d;
            --surface: #202329;
            --surface-2: #262a31;
            --border: #30343c;
            --border-strong: #3c424c;
            --text: #e6e8ec;
            --muted: #9298a2;
            --accent: #8b93f8;
            --accent-dark: #6e76e6;
            --ring: rgba(139, 147, 248, 0.25);
            --red: #f87171;   --red-bg: rgba(248, 113, 113, 0.13);
            --amber: #fbbf24; --amber-bg: rgba(251, 191, 36, 0.13);
            --green: #4ade80; --green-bg: rgba(74, 222, 128, 0.13);
            --radius: 14px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }
        @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        /* ---------- header ---------- */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            animation: fade 0.4s ease both;
        }
        .bar {
            max-width: 760px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }
        .brand { display: flex; align-items: baseline; gap: 9px; }
        .brand .name { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
        .brand .name::before {
            content: "";
            display: inline-block;
            width: 8px; height: 8px;
            margin-right: 9px;
            border-radius: 50%;
            background: var(--accent);
            vertical-align: middle;
        }
        .brand .sub { font-size: 12.5px; color: var(--muted); }
        .user { display: flex; align-items: center; gap: 14px; font-size: 13px; }
        .user .who { text-align: right; line-height: 1.3; }
        .user .who b { font-weight: 500; }
        .user form { margin: 0; }
        .btn-logout {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border-strong);
            padding: 8px 15px;
            border-radius: 9px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s, transform 0.05s;
        }
        .btn-logout:hover { background: #313640; border-color: #474e59; }
        .btn-logout:active { transform: translateY(1px); }

        /* ---------- nav ---------- */
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        nav .bar { padding-top: 0; padding-bottom: 0; justify-content: flex-start; gap: 4px; }
        nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 13px 14px 11px;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        nav a:hover { color: var(--text); }
        nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ---------- layout ---------- */
        main { max-width: 760px; margin: 32px auto; padding: 0 20px; animation: rise 0.35s ease both; }
        .page-head { margin: 0 0 20px; }
        .page-head h2 { font-size: 23px; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.02em; }
        .page-head p { margin: 0; color: var(--muted); font-size: 14px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            margin-bottom: 16px;
        }

        /* ---------- alerts ---------- */
        .alert {
            display: flex; align-items: flex-start; gap: 9px;
            border-radius: 11px;
            padding: 12px 14px;
            margin-bottom: 18px;
            font-size: 14px;
            border: 1px solid transparent;
            animation: rise 0.3s ease both;
        }
        .alert.error  { background: var(--red-bg);   color: #fca5a5; border-color: rgba(248, 113, 113, 0.3); }
        .alert.sukces { background: var(--green-bg); color: #86efac; border-color: rgba(74, 222, 128, 0.3); }

        /* ---------- forms ---------- */
        label { display: block; margin-top: 16px; font-weight: 500; font-size: 13px; color: #c2c7cf; }
        label:first-of-type { margin-top: 0; }
        input, textarea, select {
            width: 100%;
            padding: 11px 13px;
            margin-top: 6px;
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: #1a1d22;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input::placeholder, textarea::placeholder { color: #6b7280; }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--ring);
        }
        select option { background: var(--surface); }
        textarea { resize: vertical; min-height: 110px; }
        .btn-primary {
            margin-top: 20px;
            padding: 12px 22px;
            background: var(--accent);
            color: #15171c;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.15s, transform 0.05s;
        }
        .btn-primary:hover { background: var(--accent-dark); }
        .btn-primary:active { transform: translateY(1px); }

        /* ---------- ticket list ---------- */
        .ticket {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 14px;
            animation: rise 0.35s ease both;
            transition: border-color 0.15s, transform 0.12s, background 0.15s;
        }
        .ticket:hover { border-color: var(--border-strong); background: var(--surface-2); transform: translateY(-2px); }
        .ticket:nth-child(2) { animation-delay: 0.04s; }
        .ticket:nth-child(3) { animation-delay: 0.08s; }
        .ticket:nth-child(4) { animation-delay: 0.12s; }
        .ticket:nth-child(5) { animation-delay: 0.16s; }
        .ticket-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .ticket-top h3 { margin: 0; font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
        .ticket .opis { margin: 8px 0 12px; color: #c2c7cf; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
        .ticket .foot { display: flex; gap: 16px; align-items: center; font-size: 12.5px; color: var(--muted); }
        .ticket .foot .autor { color: #aab0b9; }

        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 11px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
        .pill.wysoki { background: var(--red-bg);   color: var(--red); }
        .pill.sredni { background: var(--amber-bg); color: var(--amber); }
        .pill.niski  { background: var(--green-bg); color: var(--green); }
        .rola {
            display: inline-block;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 999px;
            padding: 1px 9px;
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            text-transform: capitalize;
        }

        /* ---------- empty state ---------- */
        .empty { text-align: center; padding: 44px 20px; color: var(--muted); }
        .empty p { margin: 0 0 14px; }
        .empty a { color: var(--accent); font-weight: 500; text-decoration: none; }
        .empty a:hover { text-decoration: underline; }

        .info-row { display: flex; gap: 12px; align-items: center; margin: 6px 0; font-size: 14px; }
        .info-row .k { color: var(--muted); min-width: 64px; }
        .quick-links { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .quick-links a {
            text-decoration: none;
            color: var(--accent);
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.15s, border-color 0.15s;
        }
        .quick-links a:hover { background: #313640; border-color: #474e59; }
    </style>
</head>
<body>
    <header>
        <div class="bar">
            <div class="brand">
                <span class="name">Helpdesk</span>
                <span class="sub">sklep internetowy</span>
            </div>
            {% if user %}
            <div class="user">
                <div class="who">
                    <b>{{ user.email }}</b>
                    <div><span class="rola">{{ user.role }}</span></div>
                </div>
                <form method="post" action="{{ url_for('logout') }}">
                    <button type="submit" class="btn-logout">Wyloguj</button>
                </form>
            </div>
            {% endif %}
        </div>
    </header>
    {% if user %}
    <nav>
        <div class="bar">
            <a href="/panel" class="{% block nav_panel %}{% endblock %}">Panel</a>
            <a href="/zgloszenia" class="{% block nav_lista %}{% endblock %}">Zgłoszenia</a>
            <a href="/nowe_zgloszenie" class="{% block nav_nowe %}{% endblock %}">Nowe zgłoszenie</a>
        </div>
    </nav>
    {% endif %}
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
