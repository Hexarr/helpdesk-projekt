<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Logowanie · Helpdesk</title>
    <style>
        :root {
            --bg: #16181d;
            --surface: #202329;
            --border: #30343c;
            --border-strong: #3c424c;
            --text: #e6e8ec;
            --muted: #9298a2;
            --accent: #8b93f8;
            --accent-dark: #6e76e6;
            --ring: rgba(139, 147, 248, 0.25);
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        .login-card {
            width: 100%;
            max-width: 370px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px 30px;
            margin: 20px;
            animation: rise 0.4s ease both;
        }
        .login-card .mark {
            width: 10px; height: 10px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--accent);
        }
        .login-card h2 { text-align: center; margin: 0 0 4px; font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
        .login-card .sub { text-align: center; color: var(--muted); font-size: 14px; margin: 0 0 24px; }
        .alert {
            display: flex; align-items: flex-start; gap: 8px;
            background: rgba(248, 113, 113, 0.13); color: #fca5a5;
            border: 1px solid rgba(248, 113, 113, 0.3);
            border-radius: 10px; padding: 11px 13px; margin-bottom: 16px; font-size: 13.5px;
        }
        label { display: block; margin-top: 15px; font-weight: 500; font-size: 13px; color: #c2c7cf; }
        label:first-of-type { margin-top: 0; }
        input {
            width: 100%; padding: 11px 13px; margin-top: 6px;
            border: 1px solid var(--border-strong); border-radius: 10px;
            font-family: inherit; font-size: 14px; background: #1a1d22; color: var(--text);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input::placeholder { color: #6b7280; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring); }
        button {
            width: 100%; margin-top: 22px; padding: 12px;
            background: var(--accent); color: #15171c; border: none; border-radius: 10px;
            cursor: pointer; font-size: 15px; font-weight: 600; transition: background 0.15s, transform 0.05s;
        }
        button:hover { background: var(--accent-dark); }
        button:active { transform: translateY(1px); }
        .hint { margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); text-align: center; line-height: 1.8; }
        .hint code { background: #1a1d22; border: 1px solid var(--border); padding: 1px 6px; border-radius: 5px; font-size: 11.5px; color: #c2c7cf; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="mark"></div>
        <h2>Helpdesk</h2>
        <p class="sub">Zaloguj się do panelu zgłoszeń</p>
        {% if error %}
            <div class="alert"><span>!</span><span>{{ error }}</span></div>
        {% endif %}
        <form method="post" action="/login">
            <label>Email</label>
            <input type="email" name="email" placeholder="ty@sklep.pl" required maxlength="120" autofocus>
            <label>Hasło</label>
            <input type="password" name="password" placeholder="••••••••" required minlength="8" maxlength="128">
            <button type="submit">Zaloguj się</button>
        </form>
        <div class="hint">
            Konta testowe:<br>
            <code>admin@sklep.pl / Admin123!</code><br>
            <code>pracownik@sklep.pl / Pracownik123!</code><br>
            <code>klient@sklep.pl / Klient123!</code>
        </div>
    </div>
</body>
</html>
